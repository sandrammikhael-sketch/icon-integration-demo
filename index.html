<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Integration Demo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>Icon Integration Demo</h1>

        <div class="icons">
            <div class="card">
                <i class="fas fa-home"></i>
                <h3>Home</h3>
            </div>

            <div class="card">
                <i class="fas fa-user"></i>
                <h3>Profile</h3>
            </div>

            <div class="card">
                <i class="fas fa-envelope"></i>
                <h3>Contact</h3>
            </div>

            <div class="card">
                <i class="fas fa-cog"></i>
                <h3>Settings</h3>
            </div>
        </div>
    </div>
</body>
</html>
